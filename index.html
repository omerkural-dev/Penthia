<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penthia</title>
<style>
body{font-family:Arial;margin:0;background:#f5f7fb;color:#1a1a1a}
header{display:flex;align-items:center;justify-content:space-between;padding:15px 30px;background:#fff;border-bottom:1px solid #ddd}
header img{height:40px}
nav a{margin:0 10px;text-decoration:none;color:#333;font-weight:600}
.search{padding:8px 12px;border:1px solid #ccc;border-radius:20px}
.container{padding:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;padding:15px;border-radius:12px;cursor:pointer;border:1px solid #ddd}
.card img{width:100%}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}
.primary{background:#ffd814}
.secondary{background:#ffa41c}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;width:90%;max-width:900px;border-radius:12px}
.hidden{display:none}
form input,form textarea{width:100%;margin:10px 0;padding:10px;border:1px solid #ccc;border-radius:6px}
</style>
</head>
<body>

<header>
<div style="display:flex;align-items:center;gap:10px">
<img src="penthialogo.jpg">
<strong>Penthia</strong>
</div>
<input id="search" class="search" placeholder="Search for products">
<nav>
<a href="#products">Store</a>
<a href="#contact">Contact</a>
</nav>
</header>

<div class="container" id="products">
<h2>Products</h2>
<div class="grid" id="grid">

<div class="card" data-name="iboard pro max" onclick="openProduct('proMax')">
<img src="iBoardWebsite,windowsbackgroundiboardpro.png">
<h3>iBoard Pro Max</h3>
</div>

<div class="card" data-name="iboard pro" onclick="openProduct('pro')">
<img src="iBoardWebsite,androidbackground,withstandtoholdup.png">
<h3>iBoard Pro</h3>
</div>

<div class="card" data-name="iboard" onclick="openProduct('iboard')">
<img src="iBoardWebsite,androidbackgroundiboardpro.png">
<h3>iBoard</h3>
</div>

<div class="card" data-name="projector" onclick="openProduct('projector')">
<img src="iBoardProjectorimage#2.png">
<h3>Penthia Projector</h3>
</div>

</div>
</div>

<div class="container" id="contact">
<h2>Contact</h2>
<form onsubmit="submitForm(event)">
<input required placeholder="First Name">
<input required placeholder="Last Name">
<input required placeholder="Email or Phone">
<textarea required placeholder="Message"></textarea>
<button class="primary">Submit</button>
</form>
<p id="response" class="hidden">We will get back in less than 24 hours.</p>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<button onclick="closeModal()">Close</button>
<h2 id="title"></h2>
<div>
<button onclick="prevImg()">◀</button>
<img id="img" style="width:100%">
<button onclick="nextImg()">▶</button>
</div>
<br>
<button class="primary" onclick="openForm()">Request Quote</button>
<button class="secondary" onclick="openForm()">Contact Sales</button>
</div>
</div>

<script>

let currentImgs=[];
let index=0;

const data={
proMax:["iBoardWebsite,windowsbackgroundiboardpro.png","iBoardWebsite,androidbackgroundiboardpro.png"],
pro:["iBoardWebsite,androidbackground,withstandtoholdup.png"],
iboard:["iBoardWebsite,androidbackgroundiboardpro.png"],
projector:["iBoardProjectorimage#2.png","iBoardProector.png"]
}

function openProduct(name){
currentImgs=data[name];
index=0;
document.getElementById('img').src=currentImgs[0];
document.getElementById('title').innerText=name;
document.getElementById('modal').style.display='flex';
}

function closeModal(){document.getElementById('modal').style.display='none'}

function nextImg(){
index=(index+1)%currentImgs.length;
document.getElementById('img').src=currentImgs[index];
}

function prevImg(){
index=(index-1+currentImgs.length)%currentImgs.length;
document.getElementById('img').src=currentImgs[index];
}

// SEARCH FIXED

document.getElementById('search').addEventListener('input',function(){
let val=this.value.toLowerCase();
document.querySelectorAll('.card').forEach(c=>{
c.style.display=c.dataset.name.includes(val)?'block':'none';
})
})

function submitForm(e){
e.preventDefault();
document.getElementById('response').classList.remove('hidden');
e.target.reset();
}

function openForm(){
document.getElementById('contact').scrollIntoView();
}

</script>

</body>
</html>
