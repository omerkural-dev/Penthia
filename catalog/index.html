<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Penthia LLC — Product Catalog 2026</title>

<!-- ✅ FAVICON -->
<link rel="icon" type="image/png" href="penthialogobackgroundremoved.png"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>

<style>
:root{
  --ink:#060608;
  --paper:#0b0b0e;
  --surface:#111116;
  --surface2:#16161c;
  --gold:#c9a84c;
  --gold-hi:#e8c96a;
  --gold-dim:#8a6e2f;
  --gold-line:rgba(201,168,76,0.18);
  --gold-glow:rgba(201,168,76,0.06);
  --white:#f0ede6;
  --muted:#9c9990;
  --rule:rgba(240,237,230,0.07);
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{
  background:var(--ink);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}

.page{
  width:min(1280px,100%);
  margin:0 auto;
  padding:0 32px 80px;
}

.cover{
  position:relative;
  min-height:160px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding:48px 0 40px;
  border-bottom:1px solid var(--gold-line);
  overflow:hidden;
}

.cover-left{
  display:flex;
  align-items:center;
  gap:24px;
}

/* ✅ LOGO BIGGER */
.logo-mark{
  width:110px;height:110px;
  border:1px solid var(--gold-line);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);
}

.logo-mark img{
  width:90px;height:90px;
  object-fit:contain;
}

.brand-wordmark{
  font-family:'Bebas Neue',sans-serif;
  font-size:3.6rem;
}

.img-pane{
  position:relative;
  min-height:650px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--surface);
}

/* ✅ DEFAULT IMAGE */
.img-pane img{
  width:100%;
  height:100%;
  max-height:560px;
  object-fit:contain;
}

/* ✅ ELITE + PRO EXTRA LARGE */
.product:nth-of-type(1) .img-pane img,
.product:nth-of-type(2) .img-pane img{
  max-height:640px;
  transform:scale(1.08);
}

.copy-pane{
  padding:52px 48px;
}

.product-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:3.8rem;
}

.spec-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
}

.spec-item{
  padding:14px 18px;
  background:var(--surface);
}

.feature-list{
  list-style:none;
}

.contact-email a{
  font-size:1.1rem;
  color:var(--gold-hi);
}

.catalog-footer{
  display:flex;
  justify-content:space-between;
  padding:36px 0 0;
  border-top:1px solid var(--gold-line);
}

/* KEEP PRINT DARK */
@media print{
  body{background:#060608!important;color:#f0ede6!important}
  .img-pane,.copy-pane,.spec-item{background:#111116!important}
  a{color:#e8c96a!important}
}
</style>
</head>

<body>

<div class="page">

<header class="cover">
  <div class="cover-left">
    <div class="logo-mark">
      <img src="penthialogobackgroundremoved.png"/>
    </div>
    <div class="brand-wordmark">Penthia LLC</div>
  </div>

  <div>
    <a href="mailto:info@penthiasolutions.com">info@penthiasolutions.com</a>
  </div>
</header>

<!-- PRODUCT 1 -->
<div class="product">
  <div class="img-pane">
    <img src="vertexelite3bgremoved.png"/>
  </div>
</div>

<!-- PRODUCT 2 -->
<div class="product">
  <div class="img-pane">
    <img src="vertexelite3bgremoved.png"/>
  </div>
</div>

<!-- PRODUCT 3 -->
<div class="product">
  <div class="img-pane">
    <img src="penthiaandroudbackgroundremovedbg.png"/>
  </div>
</div>

<!-- PRODUCT 4 -->
<div class="product">
  <div class="img-pane">
    <img src="penthianosoftwareboard.png"/>
  </div>
</div>

<footer class="catalog-footer">
  <div>Penthia LLC</div>
  <div><a href="mailto:info@penthiasolutions.com">info@penthiasolutions.com</a></div>
</footer>

</div>

</body>
</html>
